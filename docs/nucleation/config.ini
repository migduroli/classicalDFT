# Parameters from Jim's Droplet/LJ/M103/T0.8/input.dat
# Jim uses dx=0.10, L=12.8 (128^3 grid). We use dx=0.4 for speed (32^3).

[model]
dx = 0.2
box_length = 12.8
temperature = 0.8
sigma = 1.0
epsilon = 1.0
cutoff = 3.0
# FMT model: RSLT, WhiteBearI, WhiteBearII
fmt_model = WhiteBearII 

[droplet]
radius = 3.0
density_inside = 0.75
supersaturation = 1.08

[fire]
dt = 0.1
dt_max = 1.0
alpha_start = 0.01
alpha_fac = 0.99
force_tolerance = 1e-8
max_steps = 500000
log_interval = 1000

[eigen]
tolerance = 1e-4
max_iterations = 300
hessian_eps = 1e-6
log_interval = 20

[ddft]
dt = 1e-2
dt_max = 1.0
fp_tolerance = 1e-4
fp_max_iterations = 100
diffusion_coefficient = 1.0
n_steps = 5000
snapshot_interval = 10
log_interval = 100
perturb_scale = 1.0
