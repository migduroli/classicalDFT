# LJ nucleation near a planar wall with a crystalline initial seed.
# The wall is a boundary-attached LJ 9-3 substrate potential.
# Use a laterally wide box so the attached droplet decays before meeting its
# periodic images in x and y.

[model.grid]
box_size = [14.0, 14.0, 8.0]
dx = 0.2
predictor_dx = 0.4           # coarser grid for the periodic predictor (speeds up wall runs)

[model.potential]
cutoff = 3.0
epsilon = 1.0
name = "LennardJones"
sigma = 1.0

[model.functional]
name = "WhiteBearII"
temperature = 0.5

[model.split]
hard_sphere_diameter = "WeeksChandlerAndersen"
interaction = "WeeksChandlerAndersen"

[droplet]
radius = 3.0
supersaturation = 4

[seed]
envelope_radii = [5.0, 4.4, 1.4]
gaussian_width = 0.30
interface_width = 0.40
kind = "Crystal"
modulation_amplitude = 0.5
offset = [0.35, -0.20, 0.05]
orientation = "001"
structure = "FCC"
unit_cells = [15, 15, 5]

[wall]
cutoff = 5.5
density = 1.15
epsilon = 0.90
kind = "LJ93"
normal = "z"
side = "lower"
sigma = 1.0

[output]
# directory = ""  # auto-generated from config params if omitted

[fire]
alpha_fac = 0.99
alpha_start = 0.01
dt = 0.1
dt_max = 1.0
force_tolerance = 1e-8
log_interval = 1000
max_steps = 500_000

[eigen]
hessian_eps = 1e-6
log_interval = 20
max_iterations = 300
tolerance = 1e-4

[ddft]
diffusion_coefficient = 1.0
dt = 1e-2
dt_max = 0.1
fp_max_iterations = 100
fp_tolerance = 1e-4
log_interval = 50
n_steps = 25_000
perturb_scale = 5.0
snapshot_interval = 200
