# LJ crystallization — replicating Lutsko, Sci. Adv. 5, eaav7399 (2019).
#
# T* = 0.4 is below the LJ triple point (≈0.694), so the equilibrium dense
# phase is FCC crystal rather than liquid. This is the regime where the
# two-step nucleation mechanism operates: liquid droplet forms first, then
# crystalline ordering develops inside.
#
# Jim uses RSLT, dx=0.10 (128^3), S ≈ 2.8-4.3 for 150-400 molecule clusters.
# We start at dx=0.2 (64^3) for tractability. Refine to dx=0.15 or 0.10 if
# crystal peaks are under-resolved.

[model.grid]
box_length = 12.8
dx = 0.2

[model.potential]
cutoff = 3.0
epsilon = 1.0
name = "LennardJones"
sigma = 1.0

[model.functional]
name = "RSLT"
temperature = 0.4

[model.split]
hard_sphere_diameter = "WeeksChandlerAndersen"
interaction = "WeeksChandlerAndersen"

[droplet]
radius = 4.0
supersaturation = 3.5

[seed]
envelope_radii = [4.5, 4.5, 4.5]
gaussian_width = 0.25
interface_width = 0.30
kind = "Crystal"
modulation_amplitude = 0.35
offset = [0.35, -0.20, 0.15]
orientation = "001"
structure = "FCC"
unit_cells = [8, 8, 8]

[wall]
kind = "None"

[fire]
alpha_fac = 0.99
alpha_start = 0.01
dt = 0.1
dt_max = 1.0
force_tolerance = 1e-8
log_interval = 1000
max_steps = 500_000

[eigen]
hessian_eps = 1e-6
log_interval = 20
max_iterations = 1000
tolerance = 1e-3

[ddft]
diffusion_coefficient = 1.0
dt = 1e-2
dt_max = 1.0
fp_max_iterations = 100
fp_tolerance = 1e-4
log_interval = 100
n_steps = 1000
perturb_scale = 20.0
snapshot_interval = 100

[string]
dt = 1e-2
dt_max = 1.0
enabled = true
log_interval = 1
max_iterations = 30
num_images = 15
relax_steps = 20
reparametrize_passes = 4
tolerance = 1e-4
