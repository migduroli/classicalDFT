name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: ./scripts/format --check

  build-and-test:
    needs: format
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake g++ \
            libgsl-dev libboost-serialization-dev libboost-dev \
            libarmadillo-dev grace

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gsl boost armadillo grace

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DDFT_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -V --output-on-failure
