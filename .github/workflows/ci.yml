name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: classicaldft

jobs:
  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commit Linter
        uses: wagoid/commitlint-github-action@v5

  test:
    name: Unit tests
    needs: [commitlint]
    runs-on: ubuntu-latest
    outputs:
      format: ${{ steps.format.outcome }}
      lint: ${{ steps.lint.outcome }}
      test: ${{ steps.test.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          tags: ${{ env.DOCKER_IMAGE }}:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - id: format
        name: Code format checking
        run: ./scripts/format --check
      - id: lint
        name: Code linting
        run: ./scripts/lint
      - id: test
        name: Unit tests
        run: ./scripts/unit-tests
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  integration-tests:
    name: Integration tests
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          tags: ${{ env.DOCKER_IMAGE }}:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Integration tests
        run: ./scripts/integration-tests

  docs-tests:
    name: Documentation tests
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          tags: ${{ env.DOCKER_IMAGE }}:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run doc examples and checks
        id: doc-check
        continue-on-error: true
        run: ./scripts/docs doc-results.md
      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('doc-results.md', 'utf-8');
            } catch {
              body = '## Doc examples CI report\n\n> **Script failed before producing results.**';
            }
            const marker = '<!-- doc-examples-ci -->';
            body = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Fail if checks failed
        if: steps.doc-check.outcome == 'failure'
        run: exit 1
